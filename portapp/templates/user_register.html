{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'user/assets/css/style-starter.css' %}">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(to right, #e3f2fd, #bbdefb);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 30px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 400px;
            margin: 100px auto 40px auto;
        }

        .container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #555;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #007BFF;
            outline: none;
        }

        .form-group button {
            width: 100%;
            padding: 12px;
            background-color: #007BFF;
            color: white;
            font-weight: 600;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .form-group button:hover {
            background-color: #0056b3;
        }

        @media (max-width: 480px) {
            .container {
                margin: 0 15px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    {% include 'home_header.html' %}

    <div class="container">
        <h2>Create an Account</h2>
        <form action="{% url 'register_user' %}" method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="name">Username</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" required>
            </div>
            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="contact">Contact</label>
                <input type="number" id="contact" name="contact" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <button type="submit">Register</button>
            </div>
        </form>
    </div>

    {% include 'home_footer.html' %}

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const validators = [];

            function handleValidation(input, pattern, validMsg, invalidMsg) {
                const feedback = document.createElement('small');
                feedback.style.display = 'block';
                input.parentNode.appendChild(feedback);

                function validate() {
                    const value = input.value.trim();
                    if (!value) {
                        feedback.textContent = '❌ This field is required';
                        feedback.style.color = 'red';
                        return false;
                    } else if (!pattern.test(value)) {
                        feedback.textContent = '❌ ' + invalidMsg;
                        feedback.style.color = 'red';
                        return false;
                    } else {
                        feedback.textContent = '✅ ' + validMsg;
                        feedback.style.color = 'green';
                        return true;
                    }
                }

                input.addEventListener('input', validate);
                validators.push(validate);
            }

            const nameInput = document.querySelector('input[name="name"]');
            if (nameInput) {
                handleValidation(nameInput, /^[A-Za-z ]+$/, 'Valid name', 'Name must contain only letters and spaces');
            }

            const contactInput = document.querySelector('input[name="contact"]');
            if (contactInput) {
                handleValidation(contactInput, /^\d{10}$/, 'Valid phone number', 'Enter a valid 10-digit phone number');
            }

            const emailInput = document.querySelector('input[name="email"]');
            if (emailInput) {
                handleValidation(emailInput, /^[^\s@]+@[^\s@]+\.[^\s@]+$/, 'Valid email address', 'Enter a valid email address');
            }

            const passwordInput = document.querySelector('input[name="password"]');
            if (passwordInput) {
                handleValidation(passwordInput, /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/, 'Strong password', 'Password must be at least 8 characters, include uppercase, lowercase, a number, and a special character');
            }

            const addressInput = document.querySelector('input[name="address"]');
            if (addressInput) {
                handleValidation(addressInput, /^[A-Za-z0-9 ]+$/, 'Valid address', 'Address can only contain letters, numbers, and spaces');
            }

            const form = document.querySelector('form');
            if (form) {
                form.addEventListener('submit', function (e) {
                    let isValid = true;
                    validators.forEach(validateFn => {
                        if (!validateFn()) isValid = false;
                    });
                    if (!isValid) {
                        e.preventDefault();
                        alert('Please correct the errors in the form.');
                    }
                });
            }
        });
    </script>
</body>
</html>

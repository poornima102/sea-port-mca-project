{% extends "company_header.html" %}
{% block content %}
<style>
    body {
        background-color: #fff !important;
        font-family: 'Rubik', sans-serif;
    }

    .page-title {
        color: #007BFF !important;
        font-weight: 600;
    }

    .ship-icon {
        margin-right: 10px;
        color: #007BFF;
    }

    .ship-card {
        border: 1px solid #e0e0e0;
        border-radius: 12px;
        box-shadow: 0 4px 12px rgba(0, 123, 255, 0.08);
        transition: transform 0.2s, box-shadow 0.2s;
        background-color: #fff;
        margin-bottom: 24px;
    }

    .ship-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 6px 20px rgba(0, 123, 255, 0.12);
    }

    .ship-card .card-body {
        padding: 20px;
    }

    .ship-card .btn-outline-primary {
        border-color: #007BFF;
        color: #007BFF;
        font-weight: 500;
    }

    .ship-card .btn-outline-primary:hover {
        background-color: #007BFF;
        color: #fff;
    }

    .no-ships {
        color: #555;
        background-color: #fdf7e3;
        border: 1px solid #ffe58f;
        border-radius: 8px;
    }

    .back-link {
        text-decoration: none;
        color: #007BFF;
        font-weight: 500;
    }

    .back-link:hover {
        text-decoration: underline;
        color: #0056b3;
    }
</style>

<div class="container py-5">
    <h1 class="mb-5 text-center page-title">
        <i class="fas fa-ship ship-icon"></i>
        Ships of {{ company.company_name }}
    </h1>

    <div class="row justify-content-center">
        {% if ships %}
            {% for ship in ships %}
                <div class="col-md-6 col-lg-4">
                    <div class="card ship-card h-100">
                        <div class="card-body d-flex align-items-center justify-content-between">
                            <div class="d-flex align-items-center">
                                <i class="fas fa-ship ship-icon"></i>
                                <span class="fs-5 fw-semibold text-primary">{{ ship.ship_name }}</span>
                            </div>
                            <a href="{% url 'view_imported_items' ship.id %}" class="btn btn-outline-primary btn-sm">
                                <i class="fas fa-box-open me-1"></i>View Imported Items
                            </a>
                        </div>
                    </div>
                </div>
            {% endfor %}
        {% else %}
            <div class="col-12">
                <div class="alert alert-warning text-center no-ships">
                    <i class="fas fa-exclamation-circle me-2"></i>No ships for this company.
                </div>
            </div>
        {% endif %}
    </div>

    <div class="text-center mt-4">
        <a href="{% url 'company' %}" class="back-link">&larr; Back to Home</a>
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html>
<head>
    <title>Track Ship Location</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f1f3f6;
        }
        .location-list {
            max-width: 700px;
            margin: 40px auto;
            margin-top: 60px;
        }
        .location-item {
            border-left: 4px solid #2874f0;
            padding-left: 16px;
            margin-bottom: 18px;
            position: relative;
            background: #fff;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            padding-top: 10px;
            padding-bottom: 10px;
        }
        .location-item:last-child {
            border-color: #43a047;
        }
        .location-date {
            font-size: 0.95em;
            color: #888;
        }
        .location-status {
            font-weight: 500;
        }
    </style>
</head>
<body>
    <h3 class="mb-4 text-center">Current Location Updates for {{ ship.ship_name }}</h3>
    <div class="location-list">
        {% for loc in locations %}
        <div class="location-item">
            <div class="location-status">{{ loc.location }}</div>
            <div class="location-date">{{ loc.current_date }} {{ loc.current_time|time:"H:i" }}</div>
        </div>
        {% empty %}
        <div class="text-muted text-center">No tracking updates yet.</div>
        {% endfor %}
    </div>
    <div class="text-center">
        <a href="{% url 'my_exports' %}" class="btn btn-secondary mt-4">Back to Exports</a>
    </div>
</body>
</html>

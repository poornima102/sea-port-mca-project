<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Companies and Their Ships</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            background-color: #0b1120; /* Dark admin-style background */
            color: #ffffff; /* White text */
            min-height: 100vh;
        }

        .page-title {
            font-weight: 700;
            letter-spacing: 1px;
            color: #e0f2fe;
        }

        .company-card {
            border: none;
            border-radius: 1rem;
            background-color: #111827; /* Dark card */
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            transition: transform 0.15s;
        }

        .company-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        .card-title {
            color: #ffffff;
            font-weight: 700;
            font-size: 1.25rem;
        }

        .card-subtitle {
            font-size: 1rem;
            color: #94a3b8;
        }

        .list-group-item {
            border: none;
            background: transparent;
            font-size: 1rem;
            color: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .no-ships {
            color: #e57373;
            font-style: italic;
        }

        .company-icon {
            font-size: 2rem;
            color: #3b82f6;
            margin-right: 0.5rem;
        }

        .add-items-btn {
            font-size: 0.9rem;
            padding: 0.25rem 0.75rem;
        }

        .btn-outline-primary {
            border-color: #3b82f6;
            color: #3b82f6;
        }

        .btn-outline-primary:hover {
            background-color: #3b82f6;
            color: #ffffff;
        }

        .btn-outline-secondary {
            color: #94a3b8;
            border-color: #94a3b8;
        }

        .btn-outline-secondary:hover {
            background-color: #94a3b8;
            color: #0b1120;
        }

        @media (max-width: 767px) {
            .company-card {
                margin-bottom: 1.5rem;
            }
        }
    </style>

    <!-- Font Awesome -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js"></script>
</head>
<body>
    <div class="container py-5">
        <a href="{% url 'admin' %}" class="btn btn-outline-secondary mb-4">
            <i class="fas fa-home"></i> Back to Home
        </a>

        <h1 class="mb-5 text-center page-title">
            <i class="fas fa-ship company-icon"></i>
            Companies and Their Ships
        </h1>

        <div class="row g-4">
            {% for entry in company_ships %}
                <div class="col-md-6 col-lg-4">
                    <div class="card company-card h-100">
                        <div class="card-body">
                            <h5 class="card-title">
                                <i class="fas fa-building me-2"></i>{{ entry.company.company_name }}
                            </h5>
                            <h6 class="card-subtitle mb-3">Ships</h6>
                            <ul class="list-group list-group-flush">
                                {% for ship in entry.ships %}
                                    <li class="list-group-item">
                                        <span>
                                            <i class="fas fa-ship me-2 text-info"></i>{{ ship.ship_name }}
                                        </span>
                                        <a href="{% url 'add_items' ship.id %}" class="btn btn-outline-primary btn-sm add-items-btn">
                                            <i class="fas fa-plus me-1"></i>Add Items
                                        </a>
                                    </li>
                                {% empty %}
                                    <li class="list-group-item no-ships">
                                        <i class="fas fa-exclamation-circle me-2"></i>No ships for this company.
                                    </li>
                                {% endfor %}
                            </ul>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

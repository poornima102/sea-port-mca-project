{% extends "company_header.html" %}
{% block title %}Edit Export Product{% endblock %}
{% block extra_head %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <h2 class="mb-4 text-center" style="color: #0d6efd;">Edit Export Product</h2>
    <form method="post" class="bg-white p-4 rounded shadow-sm">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Product Category</label>
            <input type="text" name="product_category" class="form-control" value="{{ product.product_category }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Product Name</label>
            <input type="text" name="product_name" class="form-control" value="{{ product.product_name }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Amount</label>
            <input type="number" name="amount" class="form-control" value="{{ product.amount }}" required step="0.01">
        </div>
        <div class="mb-3">
            <label class="form-label">Tax</label>
            <input type="number" name="tax" class="form-control" value="{{ product.tax }}" required step="0.01">
        </div>
        <button type="submit" class="btn btn-success">Update Product</button>
        <a href="{% url 'export_product_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}

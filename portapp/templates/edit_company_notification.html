<!DOCTYPE html>
<html>
<head>
    <title>Edit Notification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0b1120;
            color: #f1f5f9;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            max-width: 700px;
        }

        h2 {
            color: #e0f2fe;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .form-label {
            color: #cbd5e1;
        }

        .form-control {
            background-color: #1e293b;
            border: 1px solid #334155;
            color: #f1f5f9;
        }

        .form-control:focus {
            background-color: #1e293b;
            color: #fff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.25);
        }

        .card-box {
            background-color: #111827;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
            margin-top: 50px;
        }

        .btn-primary {
            background-color: #2563eb;
            border-color: #2563eb;
            font-weight: 500;
            padding: 8px 20px;
        }

        .btn-secondary {
            background-color: #334155;
            border-color: #334155;
            font-weight: 500;
            padding: 8px 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card-box">
        <h2>Edit Notification</h2>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="message" class="form-label">Notification</label>
                <textarea name="message" id="message" class="form-control" rows="4" required>{{ notification.message }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary">Update</button>
            <a href="{% url 'add_notification' %}" class="btn btn-secondary ms-2">Cancel</a>
        </form>
    </div>
</div>

</body>
</html>

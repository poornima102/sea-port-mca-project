<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Export Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="card">
        <div class="card-header bg-primary text-white">
            Export Product
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Product Category</label>
                    <input type="text" name="product_category" class="form-control" value="{{ product.product_category }}" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label">Product Name</label>
                    <input type="text" name="product_name" class="form-control" value="{{ product.product_name }}" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label">Amount</label>
                    <input type="number" name="amount" class="form-control" value="{{ product.amount }}" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label">Tax</label>
                    <input type="number" name="tax" class="form-control" value="{{ product.tax }}" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label">Number of Product</label>
                    <input type="number" name="number_of_product" class="form-control" required min="1">
                </div>
                <button type="submit" class="btn btn-success">Export</button>
                <a href="" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>

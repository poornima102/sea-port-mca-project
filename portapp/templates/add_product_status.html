{% extends "company_header.html" %}
{% block title %}Update Product Status{% endblock %}
{% block extra_head %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <h3 class="mb-4">Update Product Status for {{ export.product_name }} (Ship: {{ ship.ship_name }})</h3>
    <form method="post" class="bg-white p-4 rounded shadow-sm">
        {% csrf_token %}
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" name="booking_confirmed" id="booking_confirmed"
                {% if latest_status and latest_status.booking_confirmed %}checked{% endif %}>
            <label class="form-check-label" for="booking_confirmed">Booking Confirmed</label>
        </div>
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" name="customs_cleared" id="customs_cleared"
                {% if latest_status and latest_status.customs_cleared %}checked{% endif %}>
            <label class="form-check-label" for="customs_cleared">Customs Cleared</label>
        </div>
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" name="loaded_on_vessel" id="loaded_on_vessel"
                {% if latest_status and latest_status.loaded_on_vessel %}checked{% endif %}>
            <label class="form-check-label" for="loaded_on_vessel">Loaded on Vessel</label>
        </div>
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" name="in_transit" id="in_transit"
                {% if latest_status and latest_status.in_transit %}checked{% endif %}>
            <label class="form-check-label" for="in_transit">In Transit</label>
        </div>
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" name="arrived_at_port" id="arrived_at_port"
                {% if latest_status and latest_status.arrived_at_port %}checked{% endif %}>
            <label class="form-check-label" for="arrived_at_port">Arrived at Port</label>
        </div>
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" name="delivered" id="delivered"
                {% if latest_status and latest_status.delivered %}checked{% endif %}>
            <label class="form-check-label" for="delivered">Delivered</label>
        </div>
        <button type="submit" class="btn btn-primary mt-3">Submit Status</button>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}

{% extends "user_header.html" %}
{% block title %}Add Export{% endblock %}
{% block extra_head %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <h2 class="text-center mb-4" style="color: blue;">Add Export Details</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="company_name" class="form-label">Company Name</label>
            <select name="company_name" id="company_name" class="form-control" required disabled>
                <option value="">Select Company</option>
                {% for company in companies %}
                    <option value="{{ company.company_name }}" {% if company.company_name == selected_company_name %}selected{% endif %}>
                        {{ company.company_name }}
                    </option>
                {% endfor %}
            </select>
            <input type="hidden" name="company_name" value="{{ selected_company_name }}">
        </div>
        <div class="mb-3">
            <label for="product_category" class="form-label">Product Category</label>
            <select name="product_category" id="product_category" class="form-control" required>
                <option value="">Select Category</option>
                {% for category in product_categories %}
                    <option value="{{ category }}">{{ category }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label for="product_name" class="form-label">Product Name</label>
            <select name="product_name" id="product_name" class="form-control" required>
                <option value="">Select Product Name</option>
            </select>
        </div>
        <script>
            // Get product names by category from Django context
            const productNamesByCategory = {{ product_names_by_category|safe }};
            const productCategorySelect = document.getElementById('product_category');
            const productNameSelect = document.getElementById('product_name');

            function updateProductNames() {
                const selectedCategory = productCategorySelect.value;
                // Clear current options
                productNameSelect.innerHTML = '<option value="">Select Product Name</option>';
                if (selectedCategory && productNamesByCategory[selectedCategory]) {
                    productNamesByCategory[selectedCategory].forEach(function(name) {
                        const option = document.createElement('option');
                        option.value = name;
                        option.text = name;
                        productNameSelect.appendChild(option);
                    });
                }
            }

            productCategorySelect.addEventListener('change', updateProductNames);

            // Optionally, trigger on page load if a category is pre-selected
            document.addEventListener('DOMContentLoaded', function() {
                updateProductNames();
            });
        </script>
        <div class="mb-3">
            <label for="product_description" class="form-label">Product Description</label>
            <textarea name="product_description" id="product_description" class="form-control" rows="4" required></textarea>
        </div>
        <div class="mb-3">
            <label for="quantity" class="form-label">Quantity</label>
            <input type="number" name="quantity" id="quantity" class="form-control" required min="1">
        </div>
        <div class="mb-3">
            <label for="recipient_name" class="form-label">Recipient Name</label>
            <input type="text" name="recipient_name" id="recipient_name" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="recipient_address" class="form-label">Recipient Address</label>
            <textarea name="recipient_address" id="recipient_address" class="form-control" rows="3" required></textarea>
        </div>
        <div class="mb-3">
            <label for="recipient_contact_number" class="form-label">Recipient Contact Number</label>
            <input type="text" name="recipient_contact_number" id="recipient_contact_number" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="source" class="form-label">Source</label>
            <input type="text" name="source" id="source" class="form-control" required value="{{ ship.source }}">
        </div>
        <div class="mb-3">
            <label for="destination" class="form-label">Destination</label>
            <input type="text" name="destination" id="destination" class="form-control" required value="{{ ship.destination }}">
        </div>
        <button type="submit" class="btn btn-primary">Add Export</button>
        <a href="{% url 'exporting' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}

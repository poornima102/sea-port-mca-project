{% extends "company_header.html" %}
{% block content %}
    <style>
        body {
            background: #fff !important;
            font-family: 'Rubik', sans-serif;
            color: #007BFF;
        }
        h2 {
            color: #007BFF;
            font-weight: 600;
        }
        .list-group-item {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: background 0.2s, transform 0.2s;
        }
        .list-group-item:hover {
            background: #e3f2fd;
            transform: translateY(-2px);
        }
        .list-group-item span {
            color: #007BFF;
        }
        .list-group-item .text-muted {
            color: #5dade2 !important;
        }
        .btn-link {
            color: #007BFF;
            font-weight: 500;
            text-decoration: none;
        }
        .btn-link:hover {
            color: #0056b3;
            text-decoration: underline;
        }
    </style>

    <div class="container py-5">
        <h2 class="mb-4 text-center">Your Notifications</h2>
        <ul class="list-group">
            {% for notification in notifications %}
                <li class="list-group-item d-flex justify-content-between align-items-center shadow-sm">
                    <span>{{ notification.message }}</span>
                    <span class="text-muted small">{{ notification.created_at|date:"Y-m-d H:i" }}</span>
                </li>
            {% empty %}
                <li class="list-group-item text-center text-muted">No notifications.</li>
            {% endfor %}
        </ul>
        <div class="text-center">
            <a href="{% url 'company' %}" class="btn btn-link mt-4">&larr; Back</a>
        </div>
    </div>
{% endblock %}

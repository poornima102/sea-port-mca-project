<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit News</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0b1120;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            background-color: #111827;
            padding: 40px;
            border-radius: 12px;
            margin-top: 50px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.5);
        }

        h2 {
            color: #e0f2fe;
            font-weight: 600;
        }

        .form-label {
            color: #cbd5e1;
        }

        .form-control {
            background-color: #1e293b;
            color: #ffffff;
            border: 1px solid #334155;
        }

        .form-control:focus {
            background-color: #1e293b;
            color: #ffffff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.25);
        }

        .btn-primary {
            background-color: #2563eb;
            border-color: #2563eb;
        }

        .btn-secondary {
            background-color: #334155;
            border-color: #334155;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="text-center mb-4">Edit News</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label for="content" class="form-label">News Content</label>
                <textarea name="content" id="content" class="form-control" rows="4" required>{{ news.content }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{% url 'news_page' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

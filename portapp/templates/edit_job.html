<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Job</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0b1120;
            color: #f1f5f9;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            background-color: #111827;
            padding: 40px;
            border-radius: 16px;
            margin-top: 60px;
            max-width: 700px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.5);
        }

        h2 {
            color: #e0f2fe;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .form-label {
            color: #cbd5e1;
        }

        .form-control {
            background-color: #1e293b;
            color: #ffffff;
            border: 1px solid #334155;
        }

        .form-control:focus {
            border-color: #3b82f6;
            background-color: #1e293b;
            color: #ffffff;
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.3);
        }

        .btn-primary {
            background-color: #2563eb;
            border: none;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
        }

        .btn-secondary {
            background-color: #6b7280;
            border: none;
        }

        .btn-secondary:hover {
            background-color: #4b5563;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center">Edit Job</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Job Category</label>
            <input type="text" name="job_category" value="{{ form.job_category.value }}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Job Name</label>
            <input type="text" name="job_name" value="{{ form.job_name.value }}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Job Description</label>
            <textarea name="job_description" rows="4" class="form-control" required>{{ form.job_description.value }}</textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Salary</label>
            <input type="number" name="salary" value="{{ form.salary.value }}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Date of Apply</label>
            <input type="date" name="date_of_apply" value="{{ form.date_of_apply.value }}" class="form-control" required>
        </div>

        <div class="text-center mt-4">
            <button type="submit" class="btn btn-primary px-4">Update Job</button>
            <a href="{% url 'view_jobs' %}" class="btn btn-secondary ms-2">Cancel</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

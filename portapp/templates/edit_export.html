{% extends "user_header.html" %}
{% block title %}Edit Export{% endblock %}

{% block extra_head %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2 class="text-center mb-4" style="color: #0d6efd;">Edit Export Details</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label for="product_name" class="form-label">Product Name</label>
            <input type="text" name="product_name" id="product_name" class="form-control" value="{{ export.product_name }}" required>
        </div>
        <div class="mb-3">
            <label for="company_name" class="form-label">Company Name</label>
            <input type="text" name="company_name" id="company_name" class="form-control" value="{{ export.company_name }}" required>
        </div>
        <div class="mb-3">
            <label for="product_description" class="form-label">Product Description</label>
            <textarea name="product_description" id="product_description" class="form-control" rows="4" required>{{ export.product_description }}</textarea>
        </div>
        <div class="mb-3">
            <label for="quantity" class="form-label">Quantity</label>
            <input type="number" name="quantity" id="quantity" class="form-control" value="{{ export.quantity }}" required>
        </div>
        <div class="mb-3">
            <label for="recipient_name" class="form-label">Recipient Name</label>
            <input type="text" name="recipient_name" id="recipient_name" class="form-control" value="{{ export.recipient_name }}" required>
        </div>
        <div class="mb-3">
            <label for="recipient_address" class="form-label">Recipient Address</label>
            <textarea name="recipient_address" id="recipient_address" class="form-control" rows="4" required>{{ export.recipient_address }}</textarea>
        </div>
        <div class="mb-3">
            <label for="recipient_contact_number" class="form-label">Recipient Contact Number</label>
            <input type="text" name="recipient_contact_number" id="recipient_contact_number" class="form-control" value="{{ export.recipient_contact_number }}" required>
        </div>
        <div class="mb-3">
            <label for="destination" class="form-label">Destination</label>
            <input type="text" name="destination" id="destination" class="form-control" value="{{ export.destination }}" required>
        </div>
        <button type="submit" class="btn btn-primary">Update Export</button>
        <a href="{% url 'my_exports' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}

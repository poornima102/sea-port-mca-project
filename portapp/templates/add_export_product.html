{% extends "company_header.html" %}
{% load static %}

{% block content %}
<div class="container py-5" style="max-width: 650px;">
    <div class="card shadow-lg border-0 rounded-4">
        <div class="card-header text-white text-center rounded-top-4" style="background: linear-gradient(90deg, #003366 0%, #007BFF 100%);">
            <h2 class="mb-0 fw-bold">Add Export Product</h2>
        </div>
        <div class="card-body bg-white p-4">
            <form method="post" class="needs-validation" novalidate>
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="product_category" class="form-label fw-semibold text-primary">Product Category</label>
                    <input type="text" name="product_category" id="product_category" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="product_name" class="form-label fw-semibold text-primary">Product Name</label>
                    <input type="text" name="product_name" id="product_name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="amount" class="form-label fw-semibold text-primary">Amount</label>
                    <input type="number" name="amount" id="amount" class="form-control" min="0" step="0.01" required>
                </div>

                <div class="mb-3">
                    <label for="tax" class="form-label fw-semibold text-primary">Tax (%)</label>
                    <input type="number" name="tax" id="tax" class="form-control" min="0" step="0.01" required>
                </div>

                <div class="mb-3">
                    <label for="current_date" class="form-label fw-semibold text-primary">Current Date</label>
                    <input type="date" name="current_date" id="current_date" class="form-control" value="{{ today|date:'Y-m-d' }}" required>
                </div>

                <div class="d-flex justify-content-between">
                    <button type="submit" class="btn btn-primary px-4 shadow-sm">Add Export</button>
                    <a href="{% url 'export_product_list' %}" class="btn btn-primary px-4">Back</a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    body {
        background-color: #e3f2fd !important;
        font-family: 'Rubik', sans-serif;
        color: #003366;
    }
    .form-control:focus {
        border-color: #007BFF;
        box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
    }
    .btn-primary {
        background-color: #007BFF !important;
        border-color: #007BFF !important;
    }
    .btn-primary:hover {
        background-color: #0056b3 !important;
        border-color: #0056b3 !important;
    }
    .btn-outline-primary:hover {
        background-color: #007BFF !important;
        color: #fff !important;
    }
</style>

<script>
    // Bootstrap validation
    (function () {
        'use strict'
        var forms = document.querySelectorAll('.needs-validation')
        Array.prototype.slice.call(forms).forEach(function (form) {
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                }
                form.classList.add('was-validated')
            }, false)
        })
    })()
</script>
{% endblock %}

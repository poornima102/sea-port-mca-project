{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Job</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0b1120;
            color: #f1f5f9;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            background-color: #111827;
            border: none;
            border-radius: 14px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .card-header {
            background: linear-gradient(90deg, #003366, #007BFF);
            color: #fff;
            border-radius: 14px 14px 0 0;
            text-align: center;
            font-weight: 600;
        }

        .form-label {
            color: #cbd5e1;
        }

        .form-control {
            background-color: #1e293b;
            color: #ffffff;
            border: 1px solid #334155;
        }

        .form-control:focus {
            background-color: #1e293b;
            color: #fff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.25);
        }

        .btn-primary {
            background-color: #2563eb;
            border-color: #2563eb;
        }

        .alert-info {
            background-color: #1e40af;
            color: #ffffff;
            border: none;
        }
    </style>
</head>
<body>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header py-3">
                    <h3>Create Job</h3>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="id_job_category" class="form-label">Job Category</label>
                            <input type="text" name="job_category" class="form-control" id="id_job_category" placeholder="Enter job category" required>
                        </div>

                        <div class="mb-3">
                            <label for="id_job_name" class="form-label">Job Name</label>
                            <input type="text" name="job_name" class="form-control" id="id_job_name" placeholder="Enter job title" required>
                        </div>

                        <div class="mb-3">
                            <label for="id_job_description" class="form-label">Job Description</label>
                            <textarea name="job_description" class="form-control" id="id_job_description" rows="4" placeholder="Describe the job role" required></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="id_salary" class="form-label">Salary</label>
                                <input type="number" name="salary" class="form-control" id="id_salary" placeholder="e.g. 25000" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="id_date_of_apply" class="form-label">Date of Apply</label>
                                <input type="date" name="date_of_apply" class="form-control" id="id_date_of_apply" required>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Create Job</button>
                        </div>
                    </form>

                    {% if messages %}
                        <div class="mt-4">
                            {% for message in messages %}
                                <div class="alert alert-info">{{ message }}</div>
                            {% endfor %}
                        </div>
                    {% endif %}

                    <div class="mt-4 text-center">
                        <a href="{% url 'view_jobs' %}" class="btn btn-link text-info">Back </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

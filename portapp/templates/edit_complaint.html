{% extends "user_header.html" %}
{% block title %}Edit Complaint{% endblock %}
{% block extra_head %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <h2 class="mb-4 text-center" style="color: blue;">Edit Complaint</h2>
    <form method="post" class="mx-auto" style="max-width:600px;">
        {% csrf_token %}
        <div class="mb-3">
            <label for="complaint_text" class="form-label">Complaint</label>
            <textarea name="complaint_text" id="complaint_text" class="form-control" rows="4" required>{{ complaint.complaint_text }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Update Complaint</button>
        <a href="{% url 'complaints' complaint.export.id %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}

<!DOCTYPE html>
<html>
<head>
    <title>Make Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Payment Gateway</h2>
    <div class="card p-4">
        <h4>Total Amount to Pay: <span class="text-success">₹{{ total_price }}</span></h4>
        <form method="post" autocomplete="off">
            {% csrf_token %}
            <div class="mb-3">
                <label for="card_holder" class="form-label">Card Holder Name</label>
                <input type="text" class="form-control" id="card_holder" name="card_holder" required>
            </div>
            <div class="mb-3">
                <label for="card_number" class="form-label">Card Number</label>
                <input type="text" class="form-control" id="card_number" name="card_number" maxlength="16" pattern="\d{16}" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="expiry_date" class="form-label">Expiry Date</label>
                    <input type="text" class="form-control" id="expiry_date" name="expiry_date" placeholder="MM/YY" pattern="(0[1-9]|1[0-2])\/\d{2}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="cvv" class="form-label">CVV</label>
                    <input type="password" class="form-control" id="cvv" name="cvv" maxlength="4" pattern="\d{3,4}" required>
                </div>
            </div>
            <button type="submit" class="btn btn-success mt-3">Pay Now</button>
            <a href="{% url 'view_export_details' export.id %}" class="btn btn-secondary mt-3 ms-2">Cancel</a>
        </form>
    </div>
</div>
</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Import & Export Statistics - SEA PORTAL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: #0b1120;
            color: #f1f5f9;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            border-radius: 14px;
            margin-top: 40px;
            background-color: #111827;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        .card-header {
            background: linear-gradient(90deg, #003366, #007BFF);
            color: #fff;
            border-radius: 14px 14px 0 0;
            font-weight: 600;
            font-size: 1.2rem;
        }
        .card-body {
            background-color: #1e293b;
            padding: 25px;
            border-radius: 0 0 14px 14px;
        }
        canvas {
            background-color: #1e293b !important;
        }
        .btn-back {
            margin-top: 30px;
        }
    </style>
</head>
<body>
<div class="container">
    <a href="{% url 'admin' %}" class="btn btn-secondary btn-back">&larr; Back to Home</a>
    
    <div class="card mb-4">
        <div class="card-header">Monthly Import & Export Statistics</div>
        <div class="card-body">
            <canvas id="importExportChart" height="90"></canvas>
        </div>
    </div>

    <div class="card">
        <div class="card-header">Yearly Import & Export Statistics</div>
        <div class="card-body">
            <canvas id="importExportYearlyChart" height="90"></canvas>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    fetch("{% url 'chart_data' %}")
        .then(response => response.json())
        .then(data => {
            const commonOptions = {
                responsive: true,
                plugins: {
                    legend: { position: 'top', labels: { color: '#f1f5f9' } },
                    title: {
                        display: true,
                        text: '',
                        color: '#f1f5f9'
                    }
                },
                scales: {
                    x: {
                        ticks: { color: '#f1f5f9' },
                        grid: { color: '#334155' }
                    },
                    y: {
                        ticks: { color: '#f1f5f9' },
                        grid: { color: '#334155' }
                    }
                }
            };

            // Monthly Chart
            new Chart(document.getElementById('importExportChart').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: data.monthly_labels,
                    datasets: [
                        {
                            label: 'Imports',
                            data: data.monthly_imports,
                            backgroundColor: 'rgba(54, 162, 235, 0.7)'
                        },
                        {
                            label: 'Exports',
                            data: data.monthly_exports,
                            backgroundColor: 'rgba(255, 99, 132, 0.7)'
                        }
                    ]
                },
                options: {
                    ...commonOptions,
                    plugins: { ...commonOptions.plugins, title: { ...commonOptions.plugins.title, text: 'Imports & Exports by Month' } }
                }
            });

            // Yearly Chart
            new Chart(document.getElementById('importExportYearlyChart').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: data.yearly_labels,
                    datasets: [
                        {
                            label: 'Imports',
                            data: data.yearly_imports,
                            backgroundColor: 'rgba(54, 162, 235, 0.7)'
                        },
                        {
                            label: 'Exports',
                            data: data.yearly_exports,
                            backgroundColor: 'rgba(255, 99, 132, 0.7)'
                        }
                    ]
                },
                options: {
                    ...commonOptions,
                    plugins: { ...commonOptions.plugins, title: { ...commonOptions.plugins.title, text: 'Imports & Exports by Year' } }
                }
            });
        });
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Export Summary</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
    body {
        background: #f4f7fa;
        font-family: 'Segoe UI', sans-serif;
        padding: 30px;
    }

    .chart-container {
        max-width: 1100px;
        margin: auto;
        background: #fff;
        padding: 25px 30px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h2 {
        font-weight: 600;
        text-align: center;
        margin-bottom: 20px;
    }

    .chart-box {
        height: 500px;  /* 👈 adjust chart height here */
        position: relative;
    }

    canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100% !important;
        height: 100% !important;
    }
</style>

</head>
<body>
<nav class="mb-4">
    <a href="{% url 'company' %}" class="btn btn-outline-primary">&larr; Back to  Home</a>
</nav>

<div class="chart-container">
    <h2>📊 {{ company_name }} Export Summary</h2>

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-4" id="chartTabs" role="tablist">
        <li class="nav-item">
            <button class="nav-link active" id="monthly-tab" data-bs-toggle="tab" data-bs-target="#monthly" type="button" role="tab">
                Monthly Summary
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" id="yearly-tab" data-bs-toggle="tab" data-bs-target="#yearly" type="button" role="tab">
                Yearly Summary
            </button>
        </li>
    </ul>

    <!-- Tab Content -->
    <div class="tab-content" id="chartTabsContent">
        <!-- Monthly -->
<div class="tab-pane fade show active" id="monthly" role="tabpanel">
    <div class="chart-box">
        <canvas id="monthlyChart"></canvas>
    </div>
</div>

<!-- Yearly -->
<div class="tab-pane fade" id="yearly" role="tabpanel">
    <div class="chart-box">
        <canvas id="yearlyChart"></canvas>
    </div>
</div>

    </div>
</div>

<!-- Chart Scripts -->
<script>
    const monthlyChart = new Chart(document.getElementById('monthlyChart').getContext('2d'), {
        type: 'bar',
        data: {
            labels: {{ monthly_labels|safe }},
            datasets: [
                {
                    label: 'Total Tax (₹)',
                    data: {{ monthly_tax|safe }},
                    backgroundColor: 'rgba(255, 99, 132, 0.7)',
                    borderRadius: 5
                },
                {
                    label: 'Total Export Amount (₹)',
                    data: {{ monthly_amount|safe }},
                    backgroundColor: 'rgba(54, 162, 235, 0.7)',
                    borderRadius: 5
                }
            ]
        },
        options: {
            responsive: true,
            plugins: {
                title: {
                    display: true,
                    text: 'Monthly Export Summary',
                    font: { size: 18 }
                },
                legend: {
                    position: 'top'
                },
                tooltip: {
                    callbacks: {
                        label: ctx => `₹ ${ctx.formattedValue}`
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        callback: value => '₹' + value
                    }
                },
                x: {
                    ticks: {
                        maxRotation: 60,
                        autoSkip: false
                    }
                }
            }
        }
    });

    const yearlyChart = new Chart(document.getElementById('yearlyChart').getContext('2d'), {
        type: 'bar',
        data: {
            labels: {{ yearly_labels|safe }},
            datasets: [
                {
                    label: 'Total Tax (₹)',
                    data: {{ yearly_tax|safe }},
                    backgroundColor: 'rgba(255, 159, 64, 0.7)',
                    borderRadius: 5
                },
                {
                    label: 'Total Export Amount (₹)',
                    data: {{ yearly_amount|safe }},
                    backgroundColor: 'rgba(75, 192, 192, 0.7)',
                    borderRadius: 5
                }
            ]
        },
        options: {
            responsive: true,
            plugins: {
                title: {
                    display: true,
                    text: 'Yearly Export Summary',
                    font: { size: 18 }
                },
                legend: {
                    position: 'top'
                },
                tooltip: {
                    callbacks: {
                        label: ctx => `₹ ${ctx.formattedValue}`
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        callback: value => '₹' + value
                    }
                }
            }
        }
    });
</script>

<!-- Bootstrap JS (for tabs) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

{% extends "company_header.html" %}
{% block title %}Edit Ship{% endblock %}
{% block extra_head %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <h2 class="text-center mb-4" style="color: #0d6efd;">Edit Ship Details</h2>
    <form method="POST" class="bg-white p-4 rounded shadow-sm">
        {% csrf_token %}
        <div class="mb-3">
            <label for="ship_name" class="form-label">Ship Name</label>
            <input type="text" name="ship_name" id="ship_name" class="form-control" value="{{ ship.ship_name }}" required>
        </div>
        <div class="mb-3">
            <label for="ship_category" class="form-label">Ship Category</label>
            <input type="text" name="ship_category" id="ship_category" class="form-control" value="{{ ship.ship_category }}" required>
        </div>
        <div class="mb-3">
            <label for="source" class="form-label">Source</label>
            <input type="text" name="source" id="source" class="form-control" value="{{ ship.source }}" required>
        </div>
        <div class="mb-3">
            <label for="destination" class="form-label">Destination</label>
            <input type="text" name="destination" id="destination" class="form-control" value="{{ ship.destination }}" required>
        </div>
        <div class="mb-3">
            <label for="ship_description" class="form-label">Ship Description</label>
            <textarea name="ship_description" id="ship_description" class="form-control" rows="4" required>{{ ship.ship_description }}</textarea>
        </div>
        <div class="mb-3">
            <label for="ship_details" class="form-label">Ship Details</label>
            <textarea name="ship_details" id="ship_details" class="form-control" rows="4" required>{{ ship.ship_details }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Update Ship</button>
        <a href="{% url 'view_ships' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}

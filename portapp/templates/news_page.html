{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>News Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

    <style>
        body {
            background-color: #0b1120;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            background-color: #111827;
            padding: 40px;
            border-radius: 12px;
            margin-top: 50px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.5);
        }

        h2 {
            color: #e0f2fe;
            font-weight: 600;
        }

        .form-label {
            color: #cbd5e1;
        }

        .form-control {
            background-color: #1e293b;
            color: #ffffff;
            border: 1px solid #334155;
        }

        .form-control:focus {
            background-color: #1e293b;
            color: #fff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.25);
        }

        .btn-primary {
            background-color: #2563eb;
            border-color: #2563eb;
        }

        .btn-warning {
            background-color: #facc15;
            color: #000;
        }

        .btn-danger {
            background-color: #dc2626;
            color: #fff;
        }

        .btn-outline-secondary {
            border-color: #94a3b8;
            color: #94a3b8;
        }

        .btn-outline-secondary:hover {
            background-color: #94a3b8;
            color: #0b1120;
        }

        .table {
            background-color: transparent;
            color: #ffffff;
        }

        .table thead {
            background-color: #1e3a8a;
            color: #ffffff;
        }

        .table-bordered th,
        .table-bordered td {
            border: 1px solid #334155;
            background-color: transparent;
            color: #ffffff;
            vertical-align: middle;
        }

        .table-striped tbody tr:nth-of-type(odd) {
            background-color: #1e293b;
        }

        .table-striped tbody tr:nth-of-type(even) {
            background-color: #273449;
        }

        .table tbody tr:hover {
            background-color: #334155;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .text-muted {
            color: #94a3b8 !important;
        }
    </style>
</head>
<body>
<div class="container">

    <!-- Back Button -->
    <a href="{% url 'admin' %}" class="btn btn-outline-secondary mb-4">
        <i class="fas fa-home"></i> Back to Home
    </a>

    <h2 class="text-center mb-4">Add News</h2>
    <form method="POST" class="mb-5">
        {% csrf_token %}
        <div class="mb-3">
            <label for="content" class="form-label">News Content</label>
            <textarea name="content" id="content" class="form-control" rows="4" required></textarea>
        </div>
        <div class="text-center">
            <button type="submit" class="btn btn-primary px-4">Submit</button>
        </div>
    </form>

    <h2 class="text-center mb-4">News List</h2>
    <table class="table table-bordered table-striped">
        <thead>
            <tr class="text-center">
                <th>#</th>
                <th>News Content</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for news in news_list %}
            <tr>
                <td class="text-center">{{ forloop.counter }}</td>
                <td style="white-space: pre-wrap;">{{ news.content }}</td>
                <td class="text-center">{{ news.current_date }}</td>
                <td>
                    <div class="action-buttons">
                        <a href="{% url 'edit_news' news.id %}" class="btn btn-warning btn-sm">Edit</a>
                        <a href="{% url 'delete_news' news.id %}" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure you want to delete this news?');">Delete</a>
                    </div>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="text-center text-muted">No news available.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Summary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-success text-white">
            Payment Summary
        </div>
        <div class="card-body">
            <div class="mb-3">
                <label class="form-label fw-bold">Product Category:</label>
                <div class="form-control-plaintext">{{ product_category }}</div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Product Name:</label>
                <div class="form-control-plaintext">{{ product_name }}</div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Amount per Item:</label>
                <div class="form-control-plaintext">${{ amount|floatformat:2 }}</div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Number of Products:</label>
                <div class="form-control-plaintext">{{ number_of_product }}</div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Tax:</label>
                <div class="form-control-plaintext">${{ tax|floatformat:2 }}</div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Total Amount:</label>
                <div class="form-control-plaintext fs-5 text-danger fw-bold">${{ total_amount|floatformat:2 }}</div>
            </div>

            <form method="post" action="{% url 'process_payment' %}">
    {% csrf_token %}
    <input type="hidden" name="product_name" value="{{ product_name }}">
    <input type="hidden" name="total_amount" value="{{ total_amount }}">
    <button type="submit" class="btn btn-primary">Proceed to Payment</button>
</form>

        </div>
    </div>
</div>
</body>
</html>

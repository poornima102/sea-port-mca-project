<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Tender</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0b1120;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            max-width: 720px;
            background-color: #111827;
            padding: 40px;
            margin-top: 60px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.4);
        }

        h2 {
            color: #e0f2fe;
            font-weight: 600;
            margin-bottom: 30px;
            text-align: center;
        }

        label {
            color: #cbd5e1;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .form-control, select {
            background-color: #1e293b;
            border: 1px solid #334155;
            color: #ffffff;
        }

        .form-control:focus, select:focus {
            background-color: #1e293b;
            color: #ffffff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.25);
        }

        .btn-primary {
            background-color: #2563eb;
            border-color: #2563eb;
        }

        .btn-secondary {
            background-color: #334155;
            border-color: #334155;
            color: #ffffff;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-actions {
            text-align: center;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Add Tender</h2>
    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="id_category">Category:</label>
            <input type="text" name="category" id="id_category" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="id_tender_type">Tender Type:</label>
            <select name="tender_type" id="id_tender_type" class="form-control" required>
                <option value="">-- Select Tender Type --</option>
                <option value="Open Tender">Open Tender</option>
                <option value="Close Tender">Close Tender</option>
            </select>
        </div>

        <div class="form-group">
            <label for="id_description">Description:</label>
            <textarea name="description" id="id_description" class="form-control" rows="3" required></textarea>
        </div>

        <div class="form-group">
            <label for="id_amount">Amount:</label>
            <input type="number" name="amount" id="id_amount" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="id_start_date">Starting Date:</label>
            <input type="date" name="start_date" id="id_start_date" class="form-control" placeholder="dd-mm-yyyy" required>
        </div>

        <div class="form-group">
            <label for="id_duration_days">Number of Days:</label>
            <input type="number" name="duration_days" id="id_duration_days" class="form-control" required>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary me-2">Submit</button>
            <a href="{% url 'admin' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

</body>
</html>

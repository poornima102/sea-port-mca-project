<!DOCTYPE html>
<html>
<head>
    <title>Upload Documents</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="mb-4">Upload Documents for {{ import_item.item_name }}</h2>
        
        <form method="post" enctype="multipart/form-data" class="bg-white p-4 rounded shadow-sm">
    {% csrf_token %}
    <div class="mb-3">
        <label for="id_do_file" class="form-label fw-semibold">Delivery Order (DO)</label>
        {{ form.do_file }}
    </div>
    <div class="mb-3">
        <label for="id_customs_duty_file" class="form-label fw-semibold">Customs Duty Payment Proof</label>
        {{ form.customs_duty_file }}
    </div>
    <div class="mb-3">
        <label for="id_packing_list_file" class="form-label fw-semibold">Packing List</label>
        {{ form.packing_list_file }}
    </div>
    <div class="mb-3">
        <label for="id_import_declaration_file" class="form-label fw-semibold">Import Declaration Form</label>
        {{ form.import_declaration_file }}
    </div>
    <div class="mb-3">
        <label for="id_kyc_file" class="form-label fw-semibold">KYC Documents</label>
        {{ form.kyc_file }}
    </div>
    <button type="submit" class="btn btn-success">Upload</button>
</form>
        <a href="{% url 'upload_documents' %}" class="btn btn-link mt-4">&larr; Back</a>
    </div>
</body>
</html>
